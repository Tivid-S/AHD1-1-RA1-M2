<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AHD-1</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js"></script>
</head>

<body>
  <header class="header">
    <h1>Gimnacion Fit</h1>
    <a href="https://tivid-s.github.io/AHD1-3-RA1-M2/">Página Principal →</a>
  </header>

  <section class="hero">
    <h2>Transforma tu Cuerpo</h2>
  </section>

  <main class="contenedor">
    <h2>Planes</h2>
    <section class="grid-planes">
      <div class="card">
        <h3>Básico</h3>
        <p>Acceso general al gimnasio</p>
        <button onclick="inscribirse('Basico')">Inscribirse</button>
      </div>
      <div class="card">
        <h3>Premium</h3>
        <p>Clases grupales</p>
        <button onclick="inscribirse('Premium')">Inscribirse</button>
      </div>
      <div class="card">
        <h3>PRO</h3>
        <p>Entrenador personal</p>
        <button onclick="inscribirse('Pro')">Inscribirse</button>
      </div>
    </section>

    <h2>Entrenadores</h2>
    <section class="grid-entrenadores">
      <div class="card">
        <h3>David Roberto</h3>
        <p>Entrenador de fuerza</p>
        <button onclick="entrenador('David Roberto')">
          Selecciona a tu entrenador
        </button>
      </div>
      <div class="card">
        <h3>Andrea Desiré
        </h3>
        <p>Entrenador de crossfit</p>
        <button onclick="entrenador('Andrea Desiré')">Selecciona a tu entrenador</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>2026 Gimnasio Fit</p>
  </footer>


</body>

</html>l
